<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CineBook</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-box {
            background: #1C1C1E;
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
        .login-box h1 {
            color: #F5A623;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-box .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #0D0D0D;
            border: 1px solid #333;
            border-radius: 8px;
            color: #F2F2F7;
            font-size: 1rem;
        }
        .login-box input:focus {
            outline: none;
            border-color: #F5A623;
        }
        .login-box button {
            width: 100%;
            padding: 1rem;
            background: #F5A623;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .login-box button:hover {
            background: #e09520;
        }
        .error {
            color: #ff4444;
            text-align: center;
            margin-bottom: 1rem;
        }
        .back-link {
            display: block;
            text-align: center;
            color: #F5A623;
            margin-top: 1.5rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>CineBook</h1>
            <p class="subtitle">Admin Login</p>
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    alert(data.error || 'Login failed');
                }
            })
            .catch(err => alert('Login failed'));
        });
    </script>
</body>
</html>
