version: '3.8'

services:
  flask-app:
    build: .
    volumes:
      - ./:/app
    ports: ["5001:5000"]
    environment:
      - MONGO_URI=mongodb://mongo:27017/moviedb
    depends_on: [mongo]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: